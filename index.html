<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation SELCAL Generator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 400px;
            width: 85%;
        }
        h2 { margin-top: 0; color: #0a84ff; font-weight: 600; }
        p { color: #aaa; font-size: 0.9rem; margin-bottom: 1.5rem; }
        input {
            width: 80%;
            padding: 12px;
            font-size: 1.8rem;
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
            border: 2px solid #3a3a3c;
            border-radius: 8px;
            background-color: #2c2c2e;
            color: white;
            margin-bottom: 1.5rem;
        }
        input:focus {
            outline: none;
            border-color: #0a84ff;
        }
        button {
            width: 85%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            background-color: #30d158;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:active {
            background-color: #249d3e;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>SELCAL Transmitter</h2>
    <p>Enter a 4-letter code (e.g., ABCD)</p>
    <input type="text" id="selcalCode" maxlength="5" placeholder="AB-CD" value="AB-CD">
    <br>
    <button onclick="playSelcal()">Transmit Tones</button>
</div>

<script>
    // Standard 16-Tone Frequency Mapping
    const toneMap = {
        'A': 312.6, 'B': 346.7, 'C': 384.6, 'D': 426.6,
        'E': 473.2, 'F': 524.8, 'G': 582.1, 'H': 645.7,
        'J': 716.1, 'K': 794.3, 'L': 881.0, 'M': 977.2,
        'P': 1083.9, 'Q': 1202.3, 'R': 1333.5, 'S': 1479.1
    };

    function playSelcal() {
        // 1. Sanitize user input string
        let rawCode = document.getElementById('selcalCode').value;
        let code = rawCode.toUpperCase().replace("-", "").trim();

        if (code.length !== 4) {
            alert("Code must be exactly 4 characters.");
            return;
        }

        // 2. Map characters to frequencies
        let frequencies = [];
        for (let char of code) {
            if (!toneMap[char]) {
                alert(`Invalid character: ${char}. Use standard tones A-S (excluding I, N, O).`);
                return;
            }
            frequencies.push(toneMap[char]);
        }

        // 3. Initialize Audio Context (Crucial step for iOS Safari)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        // Setup master gain node to control overall volume split smoothly
        const masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0.4, audioCtx.currentTime); // Prevent clipping distortion
        masterGain.connect(audioCtx.destination);

        // Precise Timing Variables
        const startPulse1 = audioCtx.currentTime;
        const endPulse1 = startPulse1 + 1.0;          // 1.0 second duration
        const startPulse2 = endPulse1 + 0.2;         // 0.2 second gap
        const endPulse2 = startPulse2 + 1.0;          // 1.0 second duration

        // --- PULSE 1: Mix first two tones ---
        createTone(audioCtx, frequencies[0], startPulse1, endPulse1, masterGain);
        createTone(audioCtx, frequencies[1], startPulse1, endPulse1, masterGain);

        // --- PULSE 2: Mix second two tones ---
        createTone(audioCtx, frequencies[2], startPulse2, endPulse2, masterGain);
        createTone(audioCtx, frequencies[3], startPulse2, endPulse2, masterGain);
    }

    // Helper function to spin up and schedule an oscillator node
    function createTone(ctx, frequency, startTime, stopTime, destination) {
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(frequency, ctx.currentTime);

        // Apply quick linear ramps to avoid "clicking" sounds at audio onset/offset
        gainNode.gain.setValueAtTime(0, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.5, startTime + 0.02); 
        gainNode.gain.setValueAtTime(0.5, stopTime - 0.02);
        gainNode.gain.linearRampToValueAtTime(0, stopTime);

        osc.connect(gainNode);
        gainNode.connect(destination);

        osc.start(startTime);
        osc.stop(stopTime);
    }
</script>

</body>
</html>
